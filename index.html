<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>期末歐趴率檢測</title>
    <style>
        body { font-family: 'PingFang TC', sans-serif; background-color: #f5fdec; display: flex; justify-content: center; padding: 20px; }
        .container { width: 90%; max-width: 500px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #f5f5f5; border: 1px solid #ddd; border-radius: 10px; cursor: pointer; text-align: left; }
        .btn { background: #8bc34a; color: white; border: none; padding: 15px; border-radius: 50px; width: 100%; cursor: pointer; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .logo-container { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 15px; }
        .club-logo { width: 70px; height: 70px; object-fit: contain; }
        .social-section { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .social-links { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .social-links a img { width: 35px; height: 35px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="NewLogo.webp" alt="Logo 1" class="club-logo">
        <img src="small.webp" alt="Logo 2" class="club-logo">
    </div>

    <div id="start-page">
        <h1>📈 期末歐趴率檢測</h1>
        <p>測測你在期末的生存機率有多高！</p>
        <button class="btn" onclick="startQuiz()">開始測驗</button>
    </div>

    <div id="quiz-page" class="hidden">
        <h3 id="q-text"></h3>
        <div id="q-options"></div>
    </div>

    <div id="form-page" class="hidden">
        <div style="text-align: center; margin-bottom: 20px;">
            <h3 style="color: #689f38;">你的歐趴率已計算完成</h3>
            <p>不管你現在是：穩穩歐趴型、奮戰衝刺型、靠奇蹟生存型，<br>
            來領取歐趴糖，為你加滿期末考的運氣！</p>
            
            <form id="collect-form">
                <input type="text" id="name" placeholder="姓名" required>
                <input type="text" id="dept" placeholder="系級" required>
                <input type="tel" id="phone" placeholder="聯絡電話(僅用於領取使用)" required>
                <select id="time" required>
                    <option value="" disabled selected>選擇領取時間</option>
                    <option value="6/2(二) 19:00 管院一樓">6/2(二) 19:00 管院一樓</option>
                    <option value="6/3(三) 19:00 管院一樓">6/3(三) 19:00 管院一樓</option>
                    <option value="6/4(四) 19:00 管院一樓">6/4(四) 19:00 管院一樓</option>
                    <option value="6/5(五) 19:00 管院一樓">6/5(五) 19:00 管院一樓</option>
                    <option value="6/9(二) 19:00 管院一樓">6/9(二) 19:00 管院一樓</option>
                    <option value="6/10(三) 19:00 管院一樓">6/10(三) 19:00 管院一樓</option>
                    <option value="6/11(四) 19:00 管院一樓">6/11(四) 19:00 管院一樓</option>
                    <option value="以上都不行，另外約時間領取">以上都不行，另外約時間領取</option>
                </select>
                <button type="submit" class="btn" id="submit-btn">立即預約領取，解鎖查看歐趴率</button>
            </form>
        </div>
        
        <img src="FruitJellyDumpling.webp" alt="期末歐趴補給包" style="width: 100%; border-radius: 15px; margin: 15px 0;">
        <div style="background: #f5fdec; padding: 15px; border-radius: 15px; margin: 20px 0;">
            <p><b>✨ 考後療癒預告：端午期末聚餐</b></p>
            <p style="font-size: 0.9rem;">
                期末考結束後，我們還有一場端午期末聚餐，不論是社員或非社員，邀請你一起為期末做Happy Ending：<br>
                🍓 動手做療癒的水果凍粽<br>
                🎲 丟掉煩惱的桌遊時間<br>
                🍳 一起合作下廚的晚餐任務<br>
                <br>
                📍 地點：術德(公館鍋in頂樓)<br>
                🕒 時間：6/15(一) 13:00-20:30
            </p>
        </div>
        <div class="social-section">
            <p style="text-align: center; font-size: 0.9rem; color: #666;">追蹤台科大崇德志工社，獲取更多活動資訊：</p>
            <div class="social-links">
                <a href="https://www.instagram.com/ntustcdvc?igsh=M2pmNTJiMGpvbnRl" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/174/174855.png" alt="Instagram">
                </a>
                <a href="https://www.facebook.com/cdvcntust/" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/124/124010.png" alt="Facebook">
                </a>
                <a href="https://line.me/ti/g2/zovx0m_zdGqe-VDGrtJxYPafrxfIt5JM9Z3n2g?utm_source=invitation&utm_medium=link_copy&utm_campaign=default" target="_blank">
                    <img src="https://cdn-icons-png.flaticon.com/512/2504/2504922.png" alt="Line">
                </a>
            </div>
        </div>
    </div>

    <div id="result-page" class="hidden">
        <h2>🍬 歐趴率檢測完成！</h2>
        <h1 id="score-display"></h1>
        <h2 id="title-display"></h2>
        <p id="desc-display"></p>
        <button class="btn" onclick="location.reload()">再測一次</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwdzgWpNMCdQvS6ksQjSkpeO5mDXp3Nipv58Z1oo0MKZ7FUmdQz4ZYgQEESFNW6KAB6/exec'; // 這裡貼上你的GAS連結
    const questions = [
        { q: "Q1. 距離最後一科考試，你已經讀完多少進度？", opts: [{t:"80%以上", s:25}, {t:"60~80%", s:20}, {t:"40~60%", s:15}, {t:"20~40%", s:10}, {t:"20%以下", s:5}] },
        { q: "Q2. 本週平均每天睡多久？", opts: [{t:"7小時以上", s:20}, {t:"6~7小時", s:15}, {t:"5~6小時", s:10}, {t:"4~5小時", s:5}, {t:"不知道今天星期幾", s:0}] },
        { q: "Q3. 面對最難的那科，你現在的心情是？", opts: [{t:"穩穩的", s:20}, {t:"還有救", s:15}, {t:"有點抖", s:10}, {t:"不太妙", s:5}, {t:"已經開始找重修資訊", s:0}] },
        { q: "Q4. 考前一週的你通常是？", opts: [{t:"提前規劃型", s:20}, {t:"穩定推進型", s:15}, {t:"看心情型", s:10}, {t:"截止日前爆發型", s:5}, {t:"奇蹟發生型", s:0}] },
        { q: "Q5. 期末週最常出現的地方是？", opts: [{t:"圖書館", s:15}, {t:"實驗室", s:15}, {t:"宿舍書桌", s:15}, {t:"咖啡廳", s:15}, {t:"床上", s:0}] }
    ];

    let currentQ = 0, totalScore = 0;

    function startQuiz() {
        document.getElementById('start-page').classList.add('hidden');
        document.getElementById('quiz-page').classList.remove('hidden');
        renderQ();
    }

    function renderQ() {
        const qText = document.getElementById('q-text');
        const qOpts = document.getElementById('q-options');
        qOpts.innerHTML = '';
        qText.innerText = questions[currentQ].q;
        questions[currentQ].opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = o.t;
            btn.onclick = () => { totalScore += o.s; currentQ++; if(currentQ < questions.length) renderQ(); else showForm(); };
            qOpts.appendChild(btn);
        });
    }

    function showForm() {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('form-page').classList.remove('hidden');
    }

    document.getElementById('collect-form').onsubmit = function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "提交中...";

        const data = {
            name: document.getElementById('name').value,
            dept: document.getElementById('dept').value,
            phone: document.getElementById('phone').value,
            time: document.getElementById('time').value,
            score: totalScore
        };

        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
        .then(() => {
            document.getElementById('form-page').classList.add('hidden');
            document.getElementById('result-page').classList.remove('hidden');
            document.getElementById('score-display').innerText = `你的歐趴率：${totalScore}%`;
            
            let title = "", desc = "";
            if(totalScore >= 90) { title = "🏆 歐皇學霸型"; desc = "你的歐趴率極高。<br>現在最大的風險是睡過頭。"; }
            else if(totalScore >= 75) { title = "📚 穩定輸出型"; desc = "只要保持節奏，<br>歐趴應該不是問題。"; }
            else if(totalScore >= 60) { title = "☕ 考前衝刺型"; desc = "目前還有機會，<br>接下來幾天是關鍵。"; }
            else if(totalScore >= 40) { title = "🔥 極限挑戰型"; desc = "你和歐趴之間，<br>只差一個奇蹟與幾杯咖啡。"; }
            else { title = "🙏 天選之人型"; desc = "你的期末策略已超出科學解釋範圍。<br>建議立即補充歐趴能量。"; }
            
            document.getElementById('title-display').innerText = title;
            document.getElementById('desc-display').innerHTML = desc; // 使用 innerHTML 確保 <br> 換行有效
        });
    };
</script>
</body>
</html>
